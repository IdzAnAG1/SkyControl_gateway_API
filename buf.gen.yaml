version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/IdzAnAG1/SkyControlAPI_gateway_API/api/skycontrol/v1/auth/gen

plugins:
  - remote: buf.build/protocolbuffers/go
    out: ./api/skycontrol/generated
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: ./api/skycontrol/generated
    opt: paths=source_relative